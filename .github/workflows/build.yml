name: Build Standalone

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (linux, windows, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows

jobs:
  build-linux:
    name: Linux Build
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'linux' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fingerprint_frontend

    env:
      POSTGRES_VERSION: "16.4"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          channel: stable
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fingerprint_backend/requirements.txt

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsqlite3-dev libssl-dev \
            wget

      - name: Build backend with PyInstaller
        run: |
          python -m venv ../build/venv
          source ../build/venv/bin/activate
          pip install --upgrade pip
          pip install -r ../fingerprint_backend/requirements.txt
          pip install pyinstaller
          cd ../fingerprint_backend
          pyinstaller --clean \
            --distpath ../build/backend_dist \
            --workpath ../build/backend_build \
            backend.spec

      - name: Download PostgreSQL portable
        run: |
          mkdir -p ../build/postgres
          wget -q "https://get.enterprisedb.com/postgresql/postgresql-${POSTGRES_VERSION}-1-linux-x64-binaries.tar.gz" \
            -O ../build/postgresql.tar.gz || echo "Download failed (will use system PostgreSQL)"
          if [ -f ../build/postgresql.tar.gz ]; then
            tar xzf ../build/postgresql.tar.gz -C ../build
            if [ -d ../build/pgsql ]; then
              mv ../build/pgsql/* ../build/postgres/
            else
              EXTRACTED_DIR=$(find ../build -maxdepth 1 -type d -name "postgresql*" | head -1)
              if [ -n "$EXTRACTED_DIR" ] && [ "$EXTRACTED_DIR" != "../build/postgres" ]; then
                mv "$EXTRACTED_DIR"/* ../build/postgres/
              fi
            fi
            rm -f ../build/postgresql.tar.gz
          fi

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build Flutter Linux app
        run: flutter build linux --release

      - name: Bundle backend with Flutter app
        run: |
          FLUTTER_BUNDLE="build/linux/x64/release/bundle"
          BUNDLE_BACKEND="$FLUTTER_BUNDLE/backend"
          mkdir -p "$BUNDLE_BACKEND"
          cp ../build/backend_dist/backend_server "$BUNDLE_BACKEND/"
          cp -r ../fingerprint_backend/migrations "$BUNDLE_BACKEND/"
          if [ -d "../build/postgres/bin" ]; then
            cp -r ../build/postgres "$FLUTTER_BUNDLE/"
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-mgmt-linux
          path: fingerprint_frontend/build/linux/x64/release/bundle
          compression-level: 9

  build-windows:
    name: Windows Build
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'windows' }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: fingerprint_frontend

    env:
      POSTGRES_VERSION: "16.4"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          channel: stable
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fingerprint_backend/requirements.txt

      - name: Build backend with PyInstaller
        run: |
          python -m venv ..\build\venv
          ..\build\venv\Scripts\python -m pip install --upgrade pip
          ..\build\venv\Scripts\pip install -r ..\fingerprint_backend\requirements.txt
          ..\build\venv\Scripts\pip install pyinstaller
          cd ..\fingerprint_backend
          ..\build\venv\Scripts\pyinstaller --clean ^
            --distpath ..\build\backend_dist ^
            --workpath ..\build\backend_build ^
            backend.spec

      - name: Download PostgreSQL portable
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $zip = "..\build\postgresql.zip"
          Invoke-WebRequest -Uri "https://get.enterprisedb.com/postgresql/postgresql-$env:POSTGRES_VERSION-1-windows-x64-binaries.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "..\build\" -Force
          if (Test-Path "..\build\pgsql") {
            Move-Item "..\build\pgsql\*" "..\build\postgres\" -Force
          } else {
            $dir = Get-ChildItem "..\build\" -Directory | Where-Object { $_.Name -like "postgresql*" } | Select-Object -First 1
            if ($dir) {
              New-Item -ItemType Directory -Force -Path "..\build\postgres"
              Move-Item "$($dir.FullName)\*" "..\build\postgres\" -Force
            }
          }
          Remove-Item $zip -Force

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build Flutter Windows app
        run: flutter build windows --release

      - name: Bundle backend with Flutter app
        shell: powershell
        run: |
          $flutterBundle = "build\windows\x64\runner\Release"
          $bundleBackend = "$flutterBundle\backend"
          New-Item -ItemType Directory -Force -Path $bundleBackend
          Copy-Item "..\build\backend_dist\backend_server.exe" "$bundleBackend\" -Force
          Copy-Item "..\fingerprint_backend\migrations\*" "$bundleBackend\migrations\" -Recurse -Force
          if (Test-Path "..\build\postgres\bin") {
            Copy-Item "..\build\postgres\*" "$flutterBundle\postgres\" -Recurse -Force
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-mgmt-windows
          path: fingerprint_frontend\build\windows\x64\runner\Release
          compression-level: 9
