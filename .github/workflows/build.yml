name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: fingerprint_frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fingerprint_backend/requirements.txt

      - name: Build backend with PyInstaller
        run: |
          python -m venv ..\build\venv
          ..\build\venv\Scripts\python -m pip install --upgrade pip
          ..\build\venv\Scripts\pip install -r ..\fingerprint_backend\requirements.txt
          ..\build\venv\Scripts\pip install pyinstaller
          cd ..\fingerprint_backend
          ..\build\venv\Scripts\pyinstaller --clean --distpath ..\build\backend_dist --workpath ..\build\backend_build backend.spec

      - name: Download PostgreSQL portable
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $zip = "..\build\postgresql.zip"
          try {
            Invoke-WebRequest -Uri "https://sbp.enterprisedb.com/getfile.jsp?fileid=1260308" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "..\build\" -Force
            $src = $null
            if (Test-Path "..\build\pgsql") {
              $src = "..\build\pgsql"
            } else {
              $src = Get-ChildItem "..\build\" -Directory | Where-Object { $_.Name -like "postgresql*" } | Select-Object -First 1
            }
            if ($src) {
              New-Item -ItemType Directory -Force -Path "..\build\postgres" | Out-Null
              Copy-Item "$src\*" "..\build\postgres\" -Recurse -Force
              Remove-Item $src -Recurse -Force
            }
            Remove-Item $zip -Force
          } catch {
            Write-Host "PostgreSQL download/extract failed - app will require system PostgreSQL"
          }

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build Flutter Windows app
        run: flutter build windows --release

      - name: Bundle backend with Flutter app
        shell: powershell
        run: |
          $flutterBundle = "build\windows\x64\runner\Release"
          $bundleBackend = "$flutterBundle\backend"
          New-Item -ItemType Directory -Force -Path $bundleBackend
          Copy-Item "..\build\backend_dist\backend_server.exe" "$bundleBackend\" -Force
          Copy-Item "..\fingerprint_backend\migrations" "$bundleBackend\" -Recurse -Force
          if (Test-Path "..\build\postgres\bin") {
            Copy-Item "..\build\postgres" "$flutterBundle\" -Recurse -Force
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-mgmt-windows
          path: fingerprint_frontend\build\windows\x64\runner\Release
          compression-level: 9
